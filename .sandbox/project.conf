# .sandbox/project.conf — ferret
PROJECT_NAME=ferret

# go-sandbox version (tag, branch, or commit hash; "latest" = HEAD)
GO_SANDBOX_REF=v0.2.0

# Binaries to cross-compile (space-separated "name:path" pairs)
PROJECT_BINS="ferret:./cmd/ferret"

# Tools provided by the Codex base image (assumed present, never cross-compiled)
BASE_IMAGE_TOOLS="go jq rg fd"

# Tools we provide via prebuilt binaries
PREBUILT_TOOLS="golangci-lint govulncheck gofumpt goimports fo bat dtree"

# OPTIONAL_TOOLS: nice-to-have, not fatal if missing
# jscpd (make dupe) installed via npm in setup.sh; nilaway (make nilcheck) optional.
OPTIONAL_TOOLS="jscpd nilaway"

# go mod download needs local-replace stripping (ferret has no local replaces)
HAS_LOCAL_REPLACES=false

# Extra env vars for setup (space-separated KEY=VALUE)
SETUP_ENV=""

# Build system (make or mage)
BUILD_SYSTEM=make
